[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "icloud-mcp-server"
version = "0.1.0"
description = "Local-first FastMCP server for cached iCloud Mail, Calendar, and Contacts search."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastmcp",
  "pydantic",
  "pydantic-settings",
  "imapclient",
  "caldav",
  "httpx",
  "vobject",
  "icalendar",
  "python-dateutil",
  "beautifulsoup4",
  "lxml",
  "defusedxml",
  "aiosqlite",
  "keyring",
  "orjson",
  "tenacity",
]

[project.optional-dependencies]
dev = [
  "ruff",
]
vector = [
  "lancedb",
]

[project.scripts]
icloud-mcp = "icloud_mcp.server:main"

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP", "SIM"]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.hatch.build.targets.wheel]
packages = ["src/icloud_mcp"]
